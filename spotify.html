<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="spotify.css">
    <script src="https://kit.fontawesome.com/0e17cc80b3.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="https://cdn.iconscout.com/icon/free/png-256/free-spotify-logo-icon-svg-download-png-4390433.png?f=webp">
    <title>Spotify</title>
</head>
<body>
    <div class="logo">
        <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_White.png" alt="spot-logo">
    </div>
    <div class="h1">
        <h1>Welcome back</h1>
    </div>
    <div class="user">
         <h1>Email or Username</h1>
        <input type="text" name="email-user"> <br>
        <button id="b1">Continue</button>
         <h1 id="idd">or</h1> 
         <div class="btns">
        <button><i class="fa-solid fa-mobile"></i>Continue with Phone number</button> 
        <button><i class="fa-brands fa-google"></i>Continue with Google</button>
        <button><i class="fa-brands fa-facebook"></i>Continue with Facebook</button>
        <button><i class="fa-brands fa-apple"></i>Continue with Apple</button>
         </div>
    </div>
    <div class="sign-up">
        Dont have an account? <br>
        <a href="#">sign up</a>
    </div>
     <footer>
        This site is protected by recaptcha and the Google <a href="#">Privacy Policy</a>
        and <a href="#">Terms of Service</a> apply.
     </footer>
</body>
</html>
